server:
  port: 8080

spring:
  application:
    name: icinfo-task-management
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/icinfo_task_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.icinfo.taskmanagement.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      id-type: auto

app:
  jwt:
    secret: ${JWT_SECRET:icinfo-task-management-dev-secret-key-please-change}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:7200}
